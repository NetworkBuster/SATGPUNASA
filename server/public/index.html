<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Attachments Node Server</title>
  <style>body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:20px}button{margin:4px}</style>
</head>
<body>
  <h1>Attachments — Node Server UI</h1>
  <div id="status">Loading status…</div>
  <h3>Actions</h3>
  <button id="btn-list">List cuda-binaries</button>
  <button id="btn-prep">Prepare sample dataset</button>
  <button id="btn-train">Start short train</button>
  <pre id="out" style="white-space:pre-wrap;border:1px solid #ddd;padding:10px;height:240px;overflow:auto"></pre>

  <script>
  async function api(path, opts){
    const r = await fetch(path, opts); return r.json();
  }
  async function updateStatus(){
    const s = await api('/api/status'); document.getElementById('status').innerText = JSON.stringify(s, null, 2);
  }
  document.getElementById('btn-list').onclick = async ()=>{
    const r=await api('/api/list-files'); document.getElementById('out').innerText = JSON.stringify(r, null, 2);
  }
  document.getElementById('btn-prep').onclick = async ()=>{
    const r=await api('/api/prep-sample', {method:'POST'}); document.getElementById('out').innerText = JSON.stringify(r, null, 2);
  }
  document.getElementById('btn-train').onclick = async ()=>{
    const r=await api('/api/train', {method:'POST'}); document.getElementById('out').innerText = JSON.stringify(r, null, 2);
  }
  updateStatus();
  setInterval(updateStatus, 5000);
  </script>
</body>
</html>
